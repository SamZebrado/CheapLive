<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CheapLive Capture</title>
<style>
  html, body { margin: 0; padding: 0; background: #0d0d18; color: #e8e8f0; font-family: system-ui, sans-serif; }
  #container { display: flex; flex-direction: column; height: 100vh; }
  video, canvas { width: 100%; height: auto; display: block; background: #000; }
  #output_canvas { max-height: 60vh; }
  #hud { padding: 8px 12px; font-size: 12px; }
  #avatar { margin-top: 8px; }
  h3 { margin: 4px 0; }
</style>
</head>
<body>
<div id="container">
  <video id="webcam" playsinline autoplay muted></video>
  <canvas id="output_canvas"></canvas>
  <canvas id="avatar"></canvas>
  <div id="hud">
    <h3>面捕参数</h3>
    <div>eyeLeft: <span id="eyeLeft">1.00</span></div>
    <div>eyeRight: <span id="eyeRight">1.00</span></div>
    <div>mouthOpen: <span id="mouthOpen">0.00</span></div>
    <div>mouthSmile: <span id="mouthSmile">0.00</span></div>
    <div>headYaw: <span id="headYaw">0.00</span></div>
    <div>headPitch: <span id="headPitch">0.00</span></div>
    <div>headRoll: <span id="headRoll">0.00</span></div>
    <div>fps: <span id="fps">0</span></div>
    <div id="sessionInfo">—</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

<script type="module">
  import { createSphereMesh, deformSphere, computeVertexLight, computeSphereFaceColor } from '/assets/web/capture/sphere.js';

  const videoElement = document.getElementById('webcam');
  const canvasElement = document.getElementById('output_canvas');
  const canvasCtx = canvasElement.getContext('2d');
  const avatarCanvas = document.getElementById('avatar');
  const avatarCtx = avatarCanvas.getContext('2d');
  avatarCanvas.width = 480;
  avatarCanvas.height = 360;

  const hud = {
    eyeLeft: document.getElementById('eyeLeft'),
    eyeRight: document.getElementById('eyeRight'),
    mouthOpen: document.getElementById('mouthOpen'),
    mouthSmile: document.getElementById('mouthSmile'),
    headYaw: document.getElementById('headYaw'),
    headPitch: document.getElementById('headPitch'),
    headRoll: document.getElementById('headRoll'),
    fps: document.getElementById('fps'),
    session: document.getElementById('sessionInfo'),
  };

  // 简易人脸计算参数（不依赖完整 face_mesh）
  function computeParams(lm) {
    if (!lm || lm.length < 468) return null;
    // 左眼：点 159-145，右眼：386-374
    const leftEyeOpen = Math.max(0, 1 - distance(lm[159], lm[145]) * 8);
    const rightEyeOpen = Math.max(0, 1 - distance(lm[386], lm[374]) * 8);
    // 嘴巴：13-14 垂直距离
    const mouth = Math.min(1, distance(lm[13], lm[14]) * 6);
    // 嘴角微笑：61-291 水平扩展与常态比
    const smile = Math.max(0, Math.min(1, (distance(lm[61], lm[291]) - 0.2) * 4));
    // 头部姿态（粗略）
    const nose = lm[1];
    const leftCheek = lm[234];
    const rightCheek = lm[454];
    const yaw = Math.max(-90, Math.min(90, (rightCheek.x - leftCheek.x - 0.2) * 360));
    const pitch = Math.max(-90, Math.min(90, (nose.y - 0.4) * 360));
    return {
      eyeLeft: leftEyeOpen,
      eyeRight: rightEyeOpen,
      mouthOpen: mouth,
      mouthSmile: smile,
      browLeft: 0, browRight: 0,
      headYaw: yaw,
      headPitch: pitch,
      headRoll: 0,
      positionX: 0,
      positionY: 0,
      scale: 1,
      tailPitch: 0, tailYaw: 0, tailWave: 0,
    };
  }
  function distance(a, b) {
    return Math.hypot(a.x - b.x, a.y - b.y, (a.z || 0) - (b.z || 0));
  }

  let seq = 0;
  let lastPush = 0;
  let sessionInfo = null;

  // 尝试从原生桥获取会话信息
  try {
    if (window.CheapLiveBridge && typeof window.CheapLiveBridge.getSessionInfo === 'function') {
      const json = window.CheapLiveBridge.getSessionInfo();
      sessionInfo = JSON.parse(json);
      hud.session.textContent = `sessionId=${sessionInfo.sessionId.slice(0,8)}… port=${sessionInfo.port}`;
    }
  } catch (e) { hud.session.textContent = '单机模式'; }

  function publish(p) {
    if (!window.CheapLiveBridge) return;
    const now = Date.now();
    if (now - lastPush < 33) return; // ~30Hz
    lastPush = now;
    try {
      const payload = JSON.stringify({
        type: 'face-frame',
        version: 1,
        sessionId: sessionInfo?.sessionId || '',
        seq: ++seq,
        timestamp: now,
        avatar: 'mesh-spindle-whale',
        params: p,
      });
      window.CheapLiveBridge.publishFaceFrame(payload);
    } catch (_) {}
  }

  // 程序化球体渲染（仅球，简化版）
  function drawSphere(ctx, w, h, params) {
    ctx.fillStyle = '#1A1A2E';
    ctx.fillRect(0, 0, w, h);
    const cx = w / 2, cy = h / 2;
    const radius = Math.min(w, h) * 0.25;
    ctx.fillStyle = '#e8e4d0';
    ctx.beginPath();
    ctx.arc(cx + params.positionX * 40, cy + params.positionY * 40, radius, 0, Math.PI * 2);
    ctx.fill();
    // 眼睛
    ctx.fillStyle = '#000';
    const eyeY = cy + params.positionY * 40;
    ctx.beginPath(); ctx.arc(cx - 25, eyeY - 5, Math.max(2, 6 * params.eyeLeft), 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 25, eyeY - 5, Math.max(2, 6 * params.eyeRight), 0, Math.PI * 2); ctx.fill();
    // 嘴巴
    ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
    ctx.beginPath();
    if (params.mouthOpen > 0.1) {
      ctx.ellipse(cx, cy + 20, 8, 4 + params.mouthOpen * 12, 0, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.moveTo(cx - 8, cy + 20); ctx.quadraticCurveTo(cx, cy + 20 + params.mouthSmile * 4, cx + 8, cy + 20);
      ctx.stroke();
    }
  }

  let lastFrame = null;
  let fpsStart = Date.now(), fpsCount = 0;

  function onResults(results) {
    canvasElement.width = videoElement.videoWidth || 640;
    canvasElement.height = videoElement.videoHeight || 480;
    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    canvasCtx.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);
    canvasCtx.restore();

    const params = computeParams(results.multiFaceLandmarks?.[0] || []);
    if (params) {
      hud.eyeLeft.textContent = params.eyeLeft.toFixed(2);
      hud.eyeRight.textContent = params.eyeRight.toFixed(2);
      hud.mouthOpen.textContent = params.mouthOpen.toFixed(2);
      hud.mouthSmile.textContent = params.mouthSmile.toFixed(2);
      hud.headYaw.textContent = params.headYaw.toFixed(0);
      hud.headPitch.textContent = params.headPitch.toFixed(0);
      drawSphere(avatarCtx, avatarCanvas.width, avatarCanvas.height, params);
      lastFrame = params;
      publish(params);
    }
    fpsCount++;
    const dt = Date.now() - fpsStart;
    if (dt > 1000) {
      hud.fps.textContent = String(Math.round(fpsCount * 1000 / dt));
      fpsCount = 0; fpsStart = Date.now();
    }
  }

  // MediaPipe FaceMesh 初始化
  function startMediaPipe() {
    if (typeof FaceMesh === 'undefined' || typeof Camera === 'undefined') {
      // 无 MediaPipe，走降级：直接渲染默认 avatar，保持 publish 接口可用
      hud.session.textContent += '（MediaPipe CDN 不可用，使用默认参数）';
      const fake = { eyeLeft: 1, eyeRight: 1, mouthOpen: 0, mouthSmile: 0, browLeft: 0, browRight: 0, headYaw: 0, headPitch: 0, headRoll: 0, positionX: 0, positionY: 0, scale: 1, tailPitch: 0, tailYaw: 0, tailWave: 0 };
      drawSphere(avatarCtx, avatarCanvas.width, avatarCanvas.height, fake);
      publish(fake);
      setInterval(() => { fake.headYaw = Math.sin(Date.now() / 700) * 20; publish(fake); drawSphere(avatarCtx, avatarCanvas.width, avatarCanvas.height, fake); }, 200);
      return;
    }
    const faceMesh = new FaceMesh({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });
    faceMesh.setOptions({
      maxNumFaces: 1, refineLandmarks: true,
      minDetectionConfidence: 0.5, minTrackingConfidence: 0.5,
    });
    faceMesh.onResults(onResults);
    const camera = new Camera(videoElement, {
      onFrame: async () => { await faceMesh.send({ image: videoElement }); },
      width: 640, height: 480,
    });
    camera.start();
  }

  if (navigator.mediaDevices?.getUserMedia) {
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false })
      .then(() => { startMediaPipe(); })
      .catch(() => { startMediaPipe(); });
  } else {
    startMediaPipe();
  }
</script>
</body>
</html>
