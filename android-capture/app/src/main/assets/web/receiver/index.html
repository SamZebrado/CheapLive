<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CheapLive Receiver</title>
<style>
  html, body { margin: 0; padding: 0; background: #0d0d18; color: #e8e8f0; font-family: system-ui, sans-serif; }
  #stage { display: block; margin: 0 auto; width: 100vw; height: 80vh; background: #11111f; }
  #hud { padding: 8px 12px; font-size: 12px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .status { padding: 6px 10px; border-radius: 6px; font-size: 13px; background: #1c1c2e; }
  button { padding: 6px 12px; border: none; background: #444a78; color: #fff; border-radius: 6px; cursor: pointer; }
  button:disabled { opacity: 0.4; }
</style>
</head>
<body>
<canvas id="stage"></canvas>
<div id="hud">
  <div class="status" id="status">等待连接</div>
  <div class="status" id="latest">—</div>
  <div class="status"><button id="reconnect">重连</button></div>
</div>

<script type="module">
  import { createSphereMesh, deformSphere } from '/assets/web/receiver/sphere.js';

  const stage = document.getElementById('stage');
  const ctx = stage.getContext('2d');
  const statusEl = document.getElementById('status');
  const latestEl = document.getElementById('latest');

  function resize() {
    stage.width = Math.min(800, window.innerWidth);
    stage.height = Math.min(600, window.innerHeight * 0.8);
  }
  window.addEventListener('resize', resize);
  resize();

  // 解析 URL token
  const query = new URLSearchParams(location.search);
  const token = query.get('token') || '';

  // 基础参数
  let latest = {
    eyeLeft: 1, eyeRight: 1, mouthOpen: 0, mouthSmile: 0,
    browLeft: 0, browRight: 0, headYaw: 0, headPitch: 0, headRoll: 0,
    positionX: 0, positionY: 0, scale: 1, tailPitch: 0, tailYaw: 0, tailWave: 0,
  };
  let lastSeq = -1;
  let ws = null;
  let reconnectMs = 1000;
  let retryCount = 0;
  const MAX_RETRIES = 20;

  function connect() {
    const wsUrl = `ws://${location.host}/ws?token=${encodeURIComponent(token)}`;
    statusEl.textContent = '连接中 ' + wsUrl;
    try {
      ws = new WebSocket(wsUrl);
    } catch (e) {
      statusEl.textContent = 'WebSocket 不支持：' + e.message;
      return;
    }
    ws.onopen = () => {
      statusEl.textContent = '已连接，等待面捕帧';
      reconnectMs = 1000;
      retryCount = 0;
    };
    ws.onmessage = (ev) => {
      try {
        const msg = typeof ev.data === 'string' ? JSON.parse(ev.data) : null;
        if (!msg || msg.type !== 'face-frame' || !msg.params) return;
        // 丢弃过期帧
        if (msg.seq <= lastSeq) return;
        lastSeq = msg.seq;
        // 参数插值（简单版本：直接应用）
        latest = msg.params;
        latestEl.textContent = `seq=${msg.seq} yaw=${msg.params.headYaw.toFixed(1)} mouth=${msg.params.mouthOpen.toFixed(2)}`;
        draw();
      } catch (_) {}
    };
    ws.onclose = () => {
      statusEl.textContent = '连接已断开';
      if (retryCount < MAX_RETRIES) {
        retryCount++;
        reconnectMs = Math.min(reconnectMs * 1.5, 10000);
        statusEl.textContent = `断线：${Math.round(reconnectMs)}ms 后第 ${retryCount} 次重连`;
        setTimeout(connect, reconnectMs);
      } else {
        statusEl.textContent = '已达最大重连次数，请手动点击重连';
      }
    };
    ws.onerror = () => { try { ws.close(); } catch (_) {} };
  }

  document.getElementById('reconnect').addEventListener('click', () => {
    retryCount = 0;
    try { ws.close(); } catch (_) {}
    connect();
  });

  // 简易程序化 Avatar：纺锤鲸鱼（简化版）
  function draw() {
    const w = stage.width, h = stage.height;
    ctx.fillStyle = '#11111f';
    ctx.fillRect(0, 0, w, h);
    const cx = w / 2 + latest.positionX * 120;
    const cy = h / 2 + latest.positionY * 80;

    // 身体（椭圆纺锤）
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate((latest.headRoll * Math.PI) / 180);

    const bodyW = 180 * latest.scale;
    const bodyH = 120 * latest.scale;
    const grad = ctx.createRadialGradient(-30, -20, 10, 0, 0, bodyW / 2);
    grad.addColorStop(0, '#e4e1d3');
    grad.addColorStop(1, '#8a8778');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(0, 0, bodyW / 2, bodyH / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#2b2a30';
    ctx.lineWidth = 1;
    ctx.stroke();

    // 眼睛（左右跟随 headYaw 偏移）
    const eyeOffset = latest.headYaw / 90 * 18;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(-30 + eyeOffset, -15, 12, 8, 0, 0, Math.PI * 2);
    ctx.ellipse(30 + eyeOffset, -15, 12, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(-30 + eyeOffset, -15, Math.max(2, 5 * latest.eyeLeft), 0, Math.PI * 2);
    ctx.arc(30 + eyeOffset, -15, Math.max(2, 5 * latest.eyeRight), 0, Math.PI * 2);
    ctx.fill();

    // 嘴巴
    ctx.fillStyle = '#2a1010';
    ctx.beginPath();
    if (latest.mouthOpen > 0.1) {
      ctx.ellipse(eyeOffset, 25, 14, 4 + latest.mouthOpen * 12, 0, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.strokeStyle = '#3a3020';
      ctx.lineWidth = 2;
      ctx.moveTo(-10 + eyeOffset, 25);
      ctx.quadraticCurveTo(eyeOffset, 25 + latest.mouthSmile * 4, 10 + eyeOffset, 25);
      ctx.stroke();
    }

    // 尾巴（简单摆动）
    const tailOffset = latest.tailWave * 30 + latest.tailYaw / 30 * 20;
    ctx.beginPath();
    ctx.moveTo(bodyW / 2, 0);
    ctx.quadraticCurveTo(bodyW / 2 + 40, -20 - latest.tailPitch / 30 * 30, bodyW / 2 + 80, tailOffset - latest.tailPitch);
    ctx.quadraticCurveTo(bodyW / 2 + 40, 20 + latest.tailPitch / 30 * 30, bodyW / 2, 10);
    ctx.fillStyle = '#888';
    ctx.fill();
    ctx.strokeStyle = '#333';
    ctx.stroke();

    ctx.restore();
  }
  draw();

  if (!token) {
    statusEl.textContent = '缺少 token，请扫描二维码或手动输入链接';
  } else {
    connect();
  }
</script>
</body>
</html>
