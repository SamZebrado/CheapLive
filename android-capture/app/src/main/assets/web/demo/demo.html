<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CheapLive Capture · Avatar 离线演示</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      background: #0b0b1a;
      color: #eaeaf0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      height: 100%;
    }
    #container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #avatar_wrapper {
      position: relative;
      width: min(90vmin, 90vmin);
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #cv { display: block; width: 100%; height: 100%; }
    #hud {
      position: absolute; left: 8px; top: 8px;
      font-size: 11px; color: #c7c7d8;
      background: rgba(15, 15, 30, 0.55);
      padding: 6px 8px; border-radius: 6px;
      border: 1px solid #2e2e4a;
      max-width: 50%;
      pointer-events: none;
    }
    #hud b { color: #ff6b4a; }
    #avatarSwitch {
      position: absolute; right: 8px; top: 8px;
      font-size: 12px; background: rgba(15, 15, 30, 0.55);
      color: #eaeaf0; padding: 6px 8px; border-radius: 6px;
      border: 1px solid #2e2e4a; cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="container">
    <div id="avatar_wrapper">
      <canvas id="cv"></canvas>
    </div>
    <div id="hud">等待参数注入...</div>
    <div id="avatarSwitch">纺锤鲸鱼</div>
  </div>

<!-- 正式实现派生自 src/face-tracking/{mesh-sphere,mesh-spindle-whale,procedural-mesh-renderer}.js -->
<script src="procedural-avatar-classic.js"></script>

<script>
(function(){
  'use strict';
  var canvas = document.getElementById('cv');
  var hud = document.getElementById('hud');
  var avatarSwitch = document.getElementById('avatarSwitch');
  var qs = window.location.search || '';
  var m = qs.match(/avatar=([^&]+)/);
  var currentAvatar = (m && (m[1] === 'sphere' || m[1] === 'whale')) ? m[1] : 'whale';

  // ---- 按当前选择实例化 ----
  function makeAvatar(kind) {
    if (kind === 'sphere') {
      return new window.ProceduralSphereAvatar('cv');
    }
    return new window.ProceduralSpindleWhaleAvatar('cv');
  }

  var avatar = makeAvatar(currentAvatar);
  updateSwitchLabel();

  // ---- 事件绑定 ----
  avatarSwitch.addEventListener('click', function() {
    var next = currentAvatar === 'sphere' ? 'whale' : 'sphere';
    window.CheapLiveDemo && window.CheapLiveDemo.setAvatar(next);
  });
  window.addEventListener('resize', resize);
  function resize() {
    // 新版 renderer 内部 resize() 已处理 DPR/parent 尺寸。
    if (avatar && typeof avatar.resize === 'function') avatar.resize();
    if (avatar && typeof avatar.draw === 'function') avatar.draw();
  }
  resize();

  // ---- 参数状态 ----
  var state = {
    tick: 0,
    eyeLeft: 1.0, eyeRight: 1.0,
    mouthOpen: 0, mouthSmile: 0,
    browLeft: 0, browRight: 0,
    headYaw: 0.5, headPitch: 0.5, headRoll: 0.5,
    tailWave: 0,
    hasBridge: false
  };

  function updateSwitchLabel() {
    avatarSwitch.textContent = (currentAvatar === 'whale') ? '纺锤鲸鱼' : '球形头像';
  }

  function hudText() {
    var which = (currentAvatar === 'whale') ? '纺锤鲸鱼' : '球形头像';
    return '<b>' + which + '</b>' +
      '<br>tick: ' + state.tick +
      '<br>yaw: ' + (state.headYaw - 0.5).toFixed(2) +
      '  pitch: ' + (state.headPitch - 0.5).toFixed(2) +
      '<br>eyes: ' + state.eyeLeft.toFixed(2) + '/' + state.eyeRight.toFixed(2) +
      '<br>mouth: ' + state.mouthOpen.toFixed(2) + '  smile: ' + state.mouthSmile.toFixed(2) +
      (state.hasBridge
        ? '<br><b style="color:#4ecdc4;">Android Bridge: 已连接</b>'
        : '<br><b style="color:#888;">JS fallback: 模拟演示</b>');
  }

  function applyAndDraw() {
    avatar.updateParams({
      eyeLeft: state.eyeLeft, eyeRight: state.eyeRight,
      mouthOpen: state.mouthOpen, mouthSmile: state.mouthSmile,
      browLeft: state.browLeft, browRight: state.browRight,
      headYaw: state.headYaw, headPitch: state.headPitch, headRoll: state.headRoll
    });
    avatar.draw();
    hud.innerHTML = hudText();
  }

  applyAndDraw();

  // ---- 浏览器端 fallback：自动循环演示 ----
  var fallbackActive = false;
  var fallbackTimer = setTimeout(function() {
    fallbackActive = true;
    var simT = 0;
    function loop() {
      simT += 0.08;
      state.tick = Math.floor(simT * 12);
      // headYaw/headPitch/headRoll 为 [0,1]；中心 0.5
      state.headYaw = 0.5 + Math.sin(simT / 2) * 0.28;
      state.headPitch = 0.5 + Math.sin(simT / 3) * 0.2;
      state.headRoll = 0.5 + Math.sin(simT / 4) * 0.15;
      state.eyeLeft = 0.7 + 0.3 * Math.sin(simT * 4);
      state.eyeRight = 0.7 + 0.3 * Math.sin(simT * 4);
      state.mouthOpen = 0.5 + 0.5 * Math.sin(simT * 2);
      state.mouthSmile = 0.5 + 0.5 * Math.sin(simT * 2 + 1);
      state.tailWave = Math.sin(simT / 1.5);
      applyAndDraw();
      if (fallbackActive) window.requestAnimationFrame(loop);
    }
    window.requestAnimationFrame(loop);
  }, 500);

  // ---- Android JS Bridge：与现有 Kotlin 侧约定一致 ----
  window.CheapLiveDemo = {
    setAvatar: function(kind) {
      if (kind === currentAvatar) return;
      if (kind !== 'sphere' && kind !== 'whale') return;
      currentAvatar = kind;
      updateSwitchLabel();
      avatar = makeAvatar(currentAvatar);
      resize(); applyAndDraw();
    },
    onFrame: function(payload) {
      if (fallbackActive) { fallbackActive = false; }
      if (!payload || !payload.params) return;
      state.hasBridge = true;
      var p = payload.params;
      // 将 [0,1] 归一化参数直接传递到 renderer（renderer 内部负责映射到角度）
      if (typeof p.headYaw === 'number') state.headYaw = p.headYaw;
      if (typeof p.headPitch === 'number') state.headPitch = p.headPitch;
      if (typeof p.headRoll === 'number') state.headRoll = p.headRoll;
      if (typeof p.eyeLeft === 'number') state.eyeLeft = p.eyeLeft;
      if (typeof p.eyeRight === 'number') state.eyeRight = p.eyeRight;
      if (typeof p.mouthOpen === 'number') state.mouthOpen = p.mouthOpen;
      if (typeof p.mouthSmile === 'number') state.mouthSmile = p.mouthSmile;
      if (typeof p.browLeft === 'number') state.browLeft = p.browLeft;
      if (typeof p.browRight === 'number') state.browRight = p.browRight;
      if (typeof p.tailWave === 'number') state.tailWave = p.tailWave;
      if (typeof payload.tick === 'number') state.tick = payload.tick;
      applyAndDraw();
    },
    getAvatar: function() { return currentAvatar; }
  };
})();
</script>
</body>
</html>
