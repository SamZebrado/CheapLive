<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CheapLive — 参赛演示 Demo</title>
  <style>
    /* ===== Design Tokens (产品目标稿视觉风格) ===== */
    :root {
      --bg-primary: #0a0e1a;
      --bg-secondary: #111827;
      --bg-card: #1a2236;
      --bg-card-hover: #1f2a42;
      --bg-stage: #0d1424;
      --border-color: #2a3654;
      --border-soft: #1f2a42;
      --text-primary: #e8edf5;
      --text-secondary: #8896b3;
      --text-muted: #5a6a85;
      --color-accent: #4fc3f7;
      --color-accent2: #69db7c;
      --color-warning: #ffd43b;
      --color-danger: #ff6b6b;
      --color-purple: #b197fc;
      --color-pink: #ff8cc8;
      --radius: 14px;
      --radius-sm: 10px;
      --radius-xs: 6px;
      --shadow: 0 8px 32px rgba(0,0,0,0.45);
      --shadow-glow: 0 0 40px rgba(79,195,247,0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.5;
    }

    /* ===== Top Bar ===== */
    .topbar {
      background: linear-gradient(135deg, #0a0e1a 0%, #111827 60%, #0f1f3d 100%);
      border-bottom: 1px solid var(--border-color);
      padding: 20px 32px;
      position: relative;
      overflow: hidden;
    }
    .topbar::before {
      content: '';
      position: absolute;
      top: -60%; right: -8%;
      width: 480px; height: 480px;
      background: radial-gradient(circle, rgba(79,195,247,0.07) 0%, transparent 70%);
      pointer-events: none;
    }
    .topbar-inner {
      max-width: 1280px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; flex-wrap: wrap;
      position: relative;
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-logo {
      width: 38px; height: 38px; border-radius: 10px;
      background: linear-gradient(135deg, var(--color-accent), var(--color-purple));
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 800; color: #0a0e1a;
    }
    .brand-text h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.01em; }
    .brand-text h1 span { color: var(--color-accent); }
    .brand-text .tag {
      display: inline-block;
      background: rgba(79,195,247,0.12);
      border: 1px solid rgba(79,195,247,0.3);
      color: var(--color-accent);
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 2px 8px; border-radius: 16px;
      margin-top: 2px;
    }

    .lang-switch {
      display: flex; gap: 4px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 3px;
    }
    .lang-btn {
      border: none; background: transparent;
      color: var(--text-secondary);
      font-size: 12px; font-weight: 600;
      padding: 6px 14px; border-radius: 16px;
      cursor: pointer; transition: all 0.2s;
    }
    .lang-btn.active {
      background: var(--color-accent);
      color: #0a0e1a;
    }
    .lang-btn:not(.active):hover { color: var(--text-primary); }

    /* ===== Demo Notice ===== */
    .notice-wrap { max-width: 1280px; margin: 0 auto; padding: 14px 32px 0; }
    .demo-notice {
      background: rgba(255,212,59,0.06);
      border: 1px solid rgba(255,212,59,0.22);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      display: flex; align-items: flex-start; gap: 10px;
      font-size: 12px; color: var(--text-secondary);
      line-height: 1.6;
    }
    .demo-notice .icon { color: var(--color-warning); font-size: 14px; flex-shrink: 0; margin-top: 1px; }

    /* ===== Main Layout ===== */
    .main {
      max-width: 1280px; margin: 0 auto;
      padding: 20px 32px 48px;
    }
    .layout {
      display: grid;
      grid-template-columns: 1fr 1.4fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
    }

    .panel {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
    }
    .panel-title {
      display: flex; align-items: center; gap: 8px;
      font-size: 14px; font-weight: 700;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-soft);
    }
    .panel-title .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--color-accent2);
      box-shadow: 0 0 8px var(--color-accent2);
    }
    .panel-title .dot.app { background: var(--color-accent); box-shadow: 0 0 8px var(--color-accent); }
    .panel-title .dot.viewer { background: var(--color-pink); box-shadow: 0 0 8px var(--color-pink); }
    .panel-title .badge {
      margin-left: auto;
      font-size: 10px; font-weight: 600;
      padding: 2px 8px; border-radius: 10px;
      background: rgba(105,219,124,0.12);
      color: var(--color-accent2);
      border: 1px solid rgba(105,219,124,0.25);
    }

    /* ===== Avatar Stage (Center) ===== */
    .stage-panel {
      background: linear-gradient(180deg, var(--bg-card) 0%, var(--bg-stage) 100%);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow), var(--shadow-glow);
      display: flex; flex-direction: column;
    }
    .stage-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border-soft);
    }
    .stage-header .title { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .stage-header .live-badge {
      font-size: 10px; font-weight: 700;
      padding: 3px 8px; border-radius: 10px;
      background: rgba(255,107,107,0.15);
      color: var(--color-danger);
      border: 1px solid rgba(255,107,107,0.3);
      display: flex; align-items: center; gap: 4px;
    }
    .stage-header .live-badge::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: var(--color-danger);
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .stage-canvas-wrap {
      position: relative;
      background:
        radial-gradient(ellipse at 50% 35%, rgba(79,195,247,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 50% 100%, rgba(177,151,252,0.06) 0%, transparent 50%),
        var(--bg-stage);
      flex: 1; min-height: 340px;
      display: flex; align-items: center; justify-content: center;
    }
    .stage-canvas-wrap::before {
      content: '';
      position: absolute; bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 70%; height: 24px;
      background: radial-gradient(ellipse, rgba(79,195,247,0.18) 0%, transparent 70%);
      filter: blur(8px);
    }
    #avatarCanvas { display: block; position: relative; z-index: 1; }
    .stage-overlay {
      position: absolute; top: 12px; left: 12px;
      display: flex; flex-direction: column; gap: 6px;
      z-index: 2;
    }
    .stage-chip {
      font-size: 10px; font-weight: 600;
      padding: 3px 8px; border-radius: 8px;
      background: rgba(10,14,26,0.7);
      border: 1px solid var(--border-soft);
      color: var(--text-secondary);
      backdrop-filter: blur(6px);
    }
    .stage-chip .val { color: var(--color-accent); }

    /* ===== Controls ===== */
    .controls { padding: 16px 18px; border-top: 1px solid var(--border-soft); }
    .ctrl-section { margin-bottom: 16px; }
    .ctrl-section:last-child { margin-bottom: 0; }
    .ctrl-label {
      font-size: 11px; font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 8px;
      display: flex; align-items: center;
    }
    /* toggle switch */
    .toggle-switch {
      position: relative;
      width: 34px;
      height: 18px;
      display: inline-block;
      cursor: pointer;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--border-soft);
      border-radius: 18px;
      transition: 0.2s;
    }
    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 14px; width: 14px;
      left: 2px; bottom: 2px;
      background: white;
      border-radius: 50%;
      transition: 0.2s;
    }
    .toggle-switch input:checked + .toggle-slider {
      background: var(--color-accent);
    }
    .toggle-switch input:checked + .toggle-slider:before {
      transform: translateX(16px);
    }
    .avatar-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .avatar-btn {
      background: var(--bg-secondary);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-xs);
      padding: 10px 6px;
      cursor: pointer; transition: all 0.18s;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      color: var(--text-secondary);
      font-size: 11px; font-weight: 600;
    }
    .avatar-btn:hover { border-color: var(--color-accent); color: var(--text-primary); }
    .avatar-btn.active {
      background: rgba(79,195,247,0.12);
      border-color: var(--color-accent);
      color: var(--color-accent);
    }
    .avatar-btn .emoji { font-size: 20px; }

    .expr-grid, .action-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }
    .ctrl-btn {
      background: var(--bg-secondary);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-xs);
      padding: 8px 4px;
      cursor: pointer; transition: all 0.15s;
      color: var(--text-secondary);
      font-size: 11px; font-weight: 600;
    }
    .ctrl-btn:hover { border-color: var(--color-accent); color: var(--text-primary); background: var(--bg-card-hover); }
    .ctrl-btn:active { transform: scale(0.96); }
    .ctrl-btn.active {
      background: rgba(105,219,124,0.12);
      border-color: var(--color-accent2);
      color: var(--color-accent2);
    }

    /* ===== Side Panels (App / Viewer) ===== */
    .side-state {
      display: flex; flex-direction: column; gap: 8px;
    }
    .state-row {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 12px;
      padding: 7px 10px;
      background: var(--bg-secondary);
      border-radius: var(--radius-xs);
    }
    .state-row .k { color: var(--text-muted); }
    .state-row .v { color: var(--text-primary); font-weight: 600; font-family: 'SF Mono', Menlo, monospace; font-size: 11px; }
    .state-row .v.on { color: var(--color-accent2); }
    .state-row .v.off { color: var(--text-muted); }
    .state-row .v.warn { color: var(--color-warning); }

    /* ===== Voice Sections ===== */
    .voice-section {
      margin-top: 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 980px) { .voice-section { grid-template-columns: 1fr; } }

    .voice-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
    }
    .voice-card.ai { border-color: rgba(177,151,252,0.3); }
    .voice-card-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 6px;
    }
    .voice-card-head .name { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .voice-card-head .name .emoji { font-size: 18px; }
    .voice-badge {
      font-size: 10px; font-weight: 700;
      padding: 3px 9px; border-radius: 10px;
      letter-spacing: 0.04em;
    }
    .voice-badge.web {
      background: rgba(105,219,124,0.12);
      color: var(--color-accent2);
      border: 1px solid rgba(105,219,124,0.3);
    }
    .voice-badge.app-only {
      background: rgba(177,151,252,0.12);
      color: var(--color-purple);
      border: 1px solid rgba(177,151,252,0.3);
    }
    .voice-desc {
      font-size: 12px; color: var(--text-secondary);
      line-height: 1.6; margin-bottom: 14px;
    }

    .preset-row {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-bottom: 12px;
    }
    .preset-btn {
      background: var(--bg-secondary);
      border: 1px solid var(--border-soft);
      border-radius: 16px;
      padding: 6px 12px;
      cursor: pointer; transition: all 0.15s;
      color: var(--text-secondary);
      font-size: 11px; font-weight: 600;
    }
    .preset-btn:hover { border-color: var(--color-accent); color: var(--text-primary); }
    .preset-btn.active {
      background: rgba(79,195,247,0.14);
      border-color: var(--color-accent);
      color: var(--color-accent);
    }
    .preset-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .voice-toggle {
      width: 100%;
      padding: 10px;
      border: none; border-radius: var(--radius-xs);
      background: var(--color-accent);
      color: #0a0e1a;
      font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all 0.18s;
    }
    .voice-toggle:hover { filter: brightness(1.1); }
    .voice-toggle.on { background: var(--color-danger); color: #fff; }
    .voice-toggle.ai-btn {
      background: var(--bg-secondary);
      border: 1px solid rgba(177,151,252,0.4);
      color: var(--color-purple);
    }
    .voice-toggle.ai-btn:hover { background: rgba(177,151,252,0.1); }

    .voice-status {
      margin-top: 10px;
      font-size: 11px;
      padding: 8px 10px;
      border-radius: var(--radius-xs);
      background: var(--bg-secondary);
      color: var(--text-secondary);
      display: flex; align-items: center; gap: 6px;
    }
    .voice-status .ind {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text-muted);
    }
    .voice-status.ready .ind { background: var(--color-accent2); }
    .voice-status.requesting .ind { background: var(--color-warning); animation: pulse 1s infinite; }
    .voice-status.enabled .ind { background: var(--color-accent); }
    .voice-status.error .ind { background: var(--color-danger); }

    /* ===== AI Modal ===== */
    .ai-modal-mask {
      position: fixed; inset: 0;
      background: rgba(5,8,16,0.7);
      backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center;
      z-index: 100;
    }
    .ai-modal-mask.show { display: flex; }
    .ai-modal {
      background: var(--bg-card);
      border: 1px solid rgba(177,151,252,0.3);
      border-radius: var(--radius);
      padding: 28px;
      max-width: 440px; width: 90%;
      box-shadow: var(--shadow), 0 0 60px rgba(177,151,252,0.15);
    }
    .ai-modal h3 { font-size: 17px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .ai-modal p { font-size: 13px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 18px; }
    .ai-modal .close-btn {
      width: 100%; padding: 10px;
      background: var(--color-purple); color: #0a0e1a;
      border: none; border-radius: var(--radius-xs);
      font-size: 13px; font-weight: 700; cursor: pointer;
    }

    /* ===== Event Log ===== */
    .log-panel {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
    }
    .log-list {
      max-height: 200px; overflow-y: auto;
      background: var(--bg-stage);
      border-radius: var(--radius-xs);
      padding: 10px;
      font-family: 'SF Mono', Menlo, monospace;
      font-size: 11px;
    }
    .log-list::-webkit-scrollbar { width: 6px; }
    .log-list::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
    .log-entry {
      padding: 4px 0;
      color: var(--text-secondary);
      border-bottom: 1px solid rgba(42,54,84,0.3);
      display: flex; gap: 8px;
    }
    .log-entry:last-child { border-bottom: none; }
    .log-entry .ts { color: var(--text-muted); flex-shrink: 0; }
    .log-entry .src { font-weight: 700; flex-shrink: 0; }
    .log-entry .src.app { color: var(--color-accent); }
    .log-entry .src.viewer { color: var(--color-pink); }
    .log-entry .src.sys { color: var(--color-accent2); }
    .log-entry .msg { color: var(--text-primary); }

    /* ===== Sync Indicator ===== */
    .sync-bar {
      display: flex; align-items: center; justify-content: center;
      gap: 8px;
      padding: 8px;
      font-size: 11px; color: var(--text-muted);
    }
    .sync-bar .arrow {
      color: var(--color-accent2);
      animation: flow 2s infinite;
    }
    @keyframes flow { 0%,100%{opacity:0.4} 50%{opacity:1} }

    .footer-note {
      text-align: center; font-size: 11px; color: var(--text-muted);
      padding: 24px 0 0;
    }
  </style>
</head>
<body>
  <!-- ===== Top Bar ===== -->
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-logo">C</div>
        <div class="brand-text">
          <h1>Cheap<span>Live</span></h1>
          <span class="tag" data-i18n="tag">参赛演示 Demo</span>
        </div>
      </div>
      <div class="lang-switch" role="group">
        <button class="lang-btn active" data-lang="zh">中文</button>
        <button class="lang-btn" data-lang="en">English</button>
      </div>
    </div>
  </div>

  <!-- ===== Demo Notice ===== -->
  <div class="notice-wrap">
    <div class="demo-notice">
      <span class="icon">⚠</span>
      <span id="noticeText"></span>
    </div>
  </div>

  <!-- ===== Main ===== -->
  <div class="main">
    <!-- ===== Three-column layout ===== -->
    <div class="layout">
      <!-- App Side -->
      <div class="panel">
        <div class="panel-title">
          <span class="dot app"></span>
          <span data-i18n="appSide">App 端</span>
          <span class="badge" data-i18n="appBadge">模拟</span>
        </div>
        <div class="side-state" id="appState"></div>
      </div>

      <!-- Avatar Stage -->
      <div class="stage-panel">
        <div class="stage-header">
          <div class="title">
            <span class="dot"></span>
            <span data-i18n="stage">Avatar 舞台</span>
          </div>
          <div class="live-badge">LIVE</div>
        </div>
        <div class="stage-canvas-wrap">
          <div class="stage-overlay">
            <div class="stage-chip"><span data-i18n="avatarLabel">形象</span>: <span class="val" id="chipAvatar">—</span></div>
            <div class="stage-chip"><span data-i18n="exprLabel">表情</span>: <span class="val" id="chipExpr">—</span></div>
            <div class="stage-chip"><span data-i18n="poseLabel">姿态</span>: <span class="val" id="chipAction">—</span></div>
          </div>
          <canvas id="avatarCanvas" width="360" height="340"></canvas>
        </div>
        <div class="controls">
          <div class="ctrl-section">
            <div class="ctrl-label" data-i18n="chooseAvatar">选择 Avatar</div>
            <div class="avatar-grid" id="avatarGrid"></div>
          </div>
          <div class="ctrl-section">
            <div class="ctrl-label">
              <span data-i18n="expression">表情</span>
              <label class="toggle-switch" style="margin-left:auto">
                <input type="checkbox" id="faceCaptureToggle">
                <span class="toggle-slider"></span>
              </label>
            </div>
            <div class="expr-grid" id="exprGrid"></div>
          </div>
          <div class="ctrl-section">
            <div class="ctrl-label">
              <span data-i18n="action">动作</span>
              <label class="toggle-switch" style="margin-left:auto">
                <input type="checkbox" id="poseCaptureToggle">
                <span class="toggle-slider"></span>
              </label>
            </div>
            <div class="action-grid" id="actionGrid"></div>
          </div>
        </div>
      </div>

      <!-- Viewer Side -->
      <div class="panel">
        <div class="panel-title">
          <span class="dot viewer"></span>
          <span data-i18n="viewerSide">直播端</span>
          <span class="badge" data-i18n="viewerBadge">模拟</span>
        </div>
        <div class="side-state" id="viewerState"></div>
        <div class="sync-bar">
          <span data-i18n="synced">状态已同步</span>
          <span class="arrow">⟷</span>
        </div>
      </div>
    </div>

    <!-- ===== Voice Sections ===== -->
    <div class="voice-section">
      <!-- Web Voice -->
      <div class="voice-card">
        <div class="voice-card-head">
          <div class="name"><span class="emoji">🎙</span><span data-i18n="webVoice">普通变声</span></div>
          <span class="voice-badge web" data-i18n="webBadge">网页 Demo 可用</span>
        </div>
        <div class="voice-desc" data-i18n="webVoiceDesc"></div>
        <div class="preset-row" id="webPresetRow"></div>
        <button class="voice-toggle" id="webVoiceToggle"></button>
        <div class="voice-status" id="webVoiceStatus">
          <span class="ind"></span><span id="webVoiceStatusText"></span>
        </div>
      </div>

      <!-- AI Voice -->
      <div class="voice-card ai">
        <div class="voice-card-head">
          <div class="name"><span class="emoji">🤖</span><span data-i18n="aiVoice">AI 变声</span></div>
          <span class="voice-badge app-only" data-i18n="aiBadge">仅真实 App 可用</span>
        </div>

  let LANG = 'zh';
  function t(key) { return (I18N[LANG] && I18N[LANG][key]) || key; }

  function setLang(lang) {
    LANG = lang;
    document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
    document.querySelectorAll('.lang-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.lang === lang);
    });
    // text bindings
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const k = el.dataset.i18n;
      if (k === 'webVoiceDesc') el.textContent = t('webVoiceDesc');
      else if (k === 'aiVoiceDesc') el.textContent = t('aiVoiceDesc');
      else if (k === 'footer') el.textContent = t('footer');
      else if (k === 'notice') document.getElementById('noticeText').textContent = t('notice');
      else el.textContent = t(k);
    });
    document.getElementById('noticeText').textContent = t('notice');
    document.getElementById('aiModalText').textContent = t('aiModalText');
    // re-render dynamic UI
    renderAvatarGrid();
    renderExprGrid();
    renderActionGrid();
    renderPresets();
    renderStates();
    renderVoiceStatus();
    document.getElementById('webVoiceToggle').textContent = voiceAdapter.isActive ? t('toggleDisable') : t('toggleEnable');
    document.getElementById('aiVoiceBtn').textContent = t('aiBtnText');
  }

  // ============================================================
  // State (single source of truth, mirrors App API semantics)
  // ============================================================
  const AVATARS = ['saca', 'cat', 'dog', 'rabbit', 'fox', 'bear'];
  const FACES = ['blink', 'halfblink', 'mouth', 'smile', 'look_left', 'look_right', 'look_up', 'brow_raise', 'head_left', 'head_right'];
  const POSES = ['idle', 'paw_left', 'paw_right', 'lean_left', 'lean_right', 'crouch', 'jump', 'tail_wag', 'bounce'];
  const VOICE_PRESETS = ['original', 'cute', 'robot', 'deep', 'radio'];

  const state = {
    avatar: 'saca',
    face: null,         // current transient face expression
    pose: 'idle',       // current pose
    webVoicePreset: 'original',
    aiVoiceAvailable: 'real_app_only', // fixed
    captureMode: 'simulated',
    faceCapture: false,
    subtitle: false,
    // animation params
    anim: {
      eyeOpen: 1,      // 0..1
      mouthOpen: 0,    // 0..1
      smile: 0,        // -1..1
      eyeWide: 0,      // 0..1
      nodPhase: 0,     // animation
      lookX: 0,        // -1..1
      lookY: 0,        // -1..1
      headTilt: 0,     // -1..1
      headOffsetX: 0,  // px
      tailWag: 0,      // 0..1
      bounceY: 0,      // px offset
      bodyLean: 0,     // -1..1
      bodyCrouch: 0,   // 0..1
      pawLeft: 0,      // 0..1
      pawRight: 0,     // 0..1
      jumpPhase: -1,   // -1 = not jumping, 0..1 = progress
    },
    animTargets: { eyeOpen: 1, mouthOpen: 0, smile: 0, eyeWide: 0, lookX: 0, lookY: 0, headTilt: 0, headOffsetX: 0, tailWag: 0, bounceY: 0, bodyLean: 0, bodyCrouch: 0, pawLeft: 0, pawRight: 0 },
  };

  // ============================================================
  // Avatar Canvas Renderer (lightweight 2D, product-stage look)
  // ============================================================
  const canvas = document.getElementById('avatarCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  // Avatar visual configs
  const AVATAR_CFG = {
    saca:   { body: '#8fb3d9', bodyDark: '#5a7da8', belly: '#cfe0f0', eye: '#1a1a2e', accent: '#4a6f94', hasTail: true, shape: 'spindle' },
    cat:    { body: '#f0a868', bodyDark: '#d18b4a', belly: '#fce4c8', eye: '#2d1e0a', accent: '#e08840', hasTail: true, shape: 'round', ears: 'triangle' },
    dog:    { body: '#c89968', bodyDark: '#a87a4a', belly: '#ecdcc4', eye: '#2a1a08', accent: '#8a5a30', hasTail: true, shape: 'round', ears: 'floppy' },
    rabbit: { body: '#e8e8ec', bodyDark: '#c0c0c8', belly: '#ffffff', eye: '#ff6b9d', accent: '#ffb3c8', hasTail: true, shape: 'round', ears: 'long' },
    fox:    { body: '#e8703a', bodyDark: '#c4541e', belly: '#fce8d0', eye: '#1a1a2e', accent: '#a04020', hasTail: true, shape: 'pointy', ears: 'triangle' },
    bear:   { body: '#9a7b5a', bodyDark: '#7a5e40', belly: '#d4bc94', eye: '#1a1208', accent: '#6a4e30', hasTail: false, shape: 'round', ears: 'round' },
  };

  function drawAvatar() {
    ctx.clearRect(0, 0, W, H);
    const cx = W / 2;
    const cy = H / 2 - 30 + state.anim.bounceY;
    const cfg = AVATAR_CFG[state.avatar];
    const a = state.anim;

    // ground shadow
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    const shadowScale = 1 - a.bodyCrouch * 0.2 + Math.abs(a.bounceY) * 0.01;
    ctx.beginPath();
    ctx.ellipse(cx, cy + 115 - a.bodyCrouch * 15, 80 * shadowScale, 12 * shadowScale, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    ctx.save();
    const pawUpAvg = (a.pawLeft + a.pawRight) * 0.5;
    const totalCrouch = a.bodyCrouch * 30 + pawUpAvg * 10 + a.tailWag * 4;
    const totalLean = a.bodyLean * 0.15 + (a.pawRight - a.pawLeft) * 0.08 + a.tailWag * 0.12;
    ctx.translate(cx, cy + totalCrouch);
    ctx.rotate(totalLean);

    // back legs (draw first, behind body)
    if (cfg.shape !== 'spindle') {
      drawLegs(cfg, a, 'back');
    }

    drawBody(cfg, a);
    drawTail(cfg, a);

    // front legs (in front of body)
    if (cfg.shape !== 'spindle') {
      drawLegs(cfg, a, 'front');
    }

    // head with tilt and offset
    ctx.save();
    const headYOffset = (a.mouthOpen * 6) + (a.smile * -3) + (a.eyeWide * -2) + ((1 - a.eyeOpen) * 2) + (a.lookY * -4);
    const headScale = 1 + a.eyeWide * 0.08 + a.mouthOpen * 0.03;
    ctx.translate(a.headOffsetX + a.lookX * 5, headYOffset);
    ctx.scale(headScale, headScale);
    ctx.rotate(a.headTilt * 0.8);
    drawHead(cfg, a);
    ctx.restore();

    ctx.restore();
  }

  function drawBody(cfg, a) {
    const shape = cfg.shape;
    const crouch = a.bodyCrouch;
    const avatar = state.avatar;
    ctx.fillStyle = cfg.body;
    ctx.strokeStyle = cfg.bodyDark;
    ctx.lineWidth = 2;

    if (shape === 'spindle') {
      // Sacabambaspis: horizontal fish body, more tapered
      // main body (longer, more fish-like)
      ctx.beginPath();
      ctx.ellipse(10, 25, 95, 38, 0, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      // belly
      ctx.fillStyle = cfg.belly;
      ctx.beginPath();
      ctx.ellipse(10, 35, 75, 22, 0, 0, Math.PI * 2);
      ctx.fill();
      // head shield (front, broader, flatter)
      ctx.fillStyle = cfg.body;
      ctx.beginPath();
      ctx.ellipse(-25, 0, 55, 42, 0, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      // tapering body toward tail (narrower mid-section)
      ctx.fillStyle = cfg.body;
      ctx.beginPath();
      ctx.ellipse(50, 25, 35, 28, 0, 0, Math.PI * 2);
      ctx.fill();
      // dorsal fin
      ctx.fillStyle = cfg.bodyDark;
      ctx.beginPath();
      ctx.moveTo(15, -8);
      ctx.lineTo(25, -32);
      ctx.lineTo(40, -8);
      ctx.closePath();
      ctx.fill();
      // pectoral fins (side fins, more fin-like)
      ctx.fillStyle = cfg.bodyDark;
      ctx.beginPath();
      ctx.ellipse(-15, 40, 20, 9, 0.4, 0, Math.PI * 2);
      ctx.fill();
      // ventral fin
      ctx.fillStyle = cfg.bodyDark;
      ctx.beginPath();
      ctx.moveTo(55, 45);
      ctx.lineTo(60, 58);
      ctx.lineTo(68, 45);
      ctx.closePath();
      ctx.fill();
    } else if (shape === 'pointy') {
      // Fox: sleek, elongated body
      const bodyW = 78 + crouch * 5;
      const bodyH = 38 - crouch * 12;
      ctx.beginPath();
      ctx.ellipse(8, 38, bodyW, bodyH, 0, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      // belly (lighter, narrower)
      ctx.fillStyle = cfg.belly;
      ctx.beginPath();
      ctx.ellipse(8, 48 - crouch * 8, 58, 22 - crouch * 5, 0, 0, Math.PI * 2);
      ctx.fill();
      // chest tuft (white chest fur)
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.ellipse(-25, 30, 15, 18, 0, 0, Math.PI * 2);
      ctx.fill();
      // back mane line
      ctx.fillStyle = cfg.bodyDark;
      ctx.beginPath();
      ctx.ellipse(-5, 5, 20, 5, 0, 0, Math.PI * 2);
      ctx.fill();
    } else if (avatar === 'dog') {
      // Dog: longer, lower body, barrel chest
      const bodyW = 75 + crouch * 5;
      const bodyH = 42 - crouch * 14;
      const bodyY = 40 + crouch * 8;
      ctx.beginPath();
      ctx.ellipse(5, bodyY, bodyW, bodyH, 0, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      // belly
      ctx.fillStyle = cfg.belly;
      ctx.beginPath();
      ctx.ellipse(5, bodyY + 10, 55, 26 - crouch * 6, 0, 0, Math.PI * 2);
      ctx.fill();
      // chest (more prominent)
      ctx.fillStyle = cfg.body;
      ctx.beginPath();
      ctx.ellipse(-30, bodyY - 5, 28, 25, 0, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
    } else if (avatar === 'rabbit') {
      // Rabbit: rounder but compact body, hind legs are bigger
      const bodyW = 62 + crouch * 8;
      const bodyH = 45 - crouch * 15;
      const bodyY = 40 + crouch * 8;
      ctx.beginPath();
      ctx.ellipse(5, bodyY, bodyW, bodyH, 0, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      // belly
      ctx.fillStyle = cfg.belly;
      ctx.beginPath();
      ctx.ellipse(5, bodyY + 10, 42, 28 - crouch * 7, 0, 0, Math.PI * 2);
      ctx.fill();
      // fluffy tail area (rump)
      ctx.fillStyle = cfg.body;
      ctx.beginPath();
      ctx.arc(45, bodyY - 5, 18, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
    } else if (avatar === 'bear') {
      // Bear: bulky, thick body, shorter legs
      const bodyW = 70 + crouch * 5;
      const bodyH = 50 - crouch * 15;
      const bodyY = 38 + crouch * 10;
      ctx.beginPath();
      ctx.ellipse(0, bodyY, bodyW, bodyH, 0, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      // belly
      ctx.fillStyle = cfg.belly;
      ctx.beginPath();
      ctx.ellipse(0, bodyY + 12, 50, 32 - crouch * 8, 0, 0, Math.PI * 2);
      ctx.fill();
      // shoulder humps
      ctx.fillStyle = cfg.bodyDark;
      ctx.globalAlpha = 0.4;
      ctx.beginPath();
      ctx.ellipse(-20, bodyY - 30, 20, 12, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(20, bodyY - 30, 20, 12, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else {
      // Cat: sleek, compact round-oval body
      const bodyW = 65 + crouch * 5;
      const bodyH = 46 - crouch * 15;
      const bodyY = 40 + crouch * 8;
      ctx.beginPath();
      ctx.ellipse(0, bodyY, bodyW, bodyH, 0, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      // belly
      ctx.fillStyle = cfg.belly;
      ctx.beginPath();
      ctx.ellipse(0, bodyY + 10, 45, 28 - crouch * 7, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawLegs(cfg, a, layer) {
    const crouch = a.bodyCrouch;
    const pawLeft = a.pawLeft;
    const pawRight = a.pawRight;
    const avatar = state.avatar;
    ctx.fillStyle = cfg.body;
    ctx.strokeStyle = cfg.bodyDark;
    ctx.lineWidth = 2;

    // species-specific leg scaling
    let legW = 10;
    let pawW = 13;
    let pawH = 7;
    if (avatar === 'bear') { legW = 14; pawW = 18; pawH = 9; }
    else if (avatar === 'rabbit') { legW = 9; pawW = 12; pawH = 6; }
    else if (avatar === 'fox') { legW = 8; pawW = 11; pawH = 6; }
    else if (avatar === 'dog') { legW = 11; pawW = 14; pawH = 7; }

    if (layer === 'back') {
      // back legs (further back, slightly wider stance)
      [-1, 1].forEach(s => {
        const legX = s * 60;
        const legTopY = 58 + crouch * 5;
        const legLen = Math.max(15, 38 * (1 - crouch * 0.4));
        const pawY = legTopY + legLen;
        // upper leg
        ctx.fillStyle = cfg.bodyDark;
        ctx.beginPath();
        ctx.ellipse(legX, legTopY + 8, legW + 1, 14, 0, 0, Math.PI * 2);
        ctx.fill(); ctx.stroke();
        // lower leg
        ctx.fillStyle = cfg.body;
        ctx.beginPath();
        const lowerLen = Math.max(8, (legLen - 20) / 2);
        ctx.ellipse(legX, legTopY + legLen / 2 + 5, legW - 1, lowerLen, 0, 0, Math.PI * 2);
        ctx.fill(); ctx.stroke();
        // paw
        ctx.fillStyle = cfg.bodyDark;
        ctx.beginPath();
        ctx.ellipse(legX, pawY, pawW, pawH, 0, 0, Math.PI * 2);
        ctx.fill(); ctx.stroke();
        ctx.fillStyle = cfg.body;
      });
    } else {
      // front legs (more prominent, with paw raise animation)
      [-1, 1].forEach(s => {
        const isLeft = s === -1;
        const pawUp = isLeft ? pawLeft : pawRight;
        const legX = s * 50;
        const legTopY = 48 + crouch * 3;
        const baseLen = 42 * (1 - crouch * 0.5);
        const legLen = Math.max(8, baseLen - pawUp * 32);
        const pawY = legTopY + legLen;
        const tiltAngle = pawUp * s * 0.6;
        
        // shoulder/upper arm (darker)
        ctx.fillStyle = cfg.bodyDark;
        ctx.beginPath();
        ctx.ellipse(legX, legTopY + 10, legW + 2, 15, tiltAngle * 0.3, 0, Math.PI * 2);
        ctx.fill(); ctx.stroke();
        
        // forearm
        ctx.fillStyle = cfg.body;
        ctx.beginPath();
        const frontLowerLen = Math.max(8, (legLen - 22) / 2);
        ctx.ellipse(legX + pawUp * s * 3, legTopY + legLen / 2 + 6, legW, frontLowerLen, tiltAngle * 0.5, 0, Math.PI * 2);
        ctx.fill(); ctx.stroke();
        
        // paw
        ctx.fillStyle = cfg.bodyDark;
        ctx.beginPath();
        ctx.ellipse(legX + pawUp * s * 8, pawY, pawW + 1, pawH + 1, 0, 0, Math.PI * 2);
        ctx.fill(); ctx.stroke();
        
        // paw pads / toes detail
        ctx.fillStyle = cfg.accent;
        ctx.globalAlpha = 0.6;
        ctx.beginPath();
        ctx.arc(legX + pawUp * s * 8 - 3, pawY + 1, 2.5, 0, Math.PI * 2);
        ctx.arc(legX + pawUp * s * 8 + 3, pawY + 1, 2.5, 0, Math.PI * 2);
        ctx.arc(legX + pawUp * s * 8, pawY - 1, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.fillStyle = cfg.body;
      });
    }
  }

  function drawTail(cfg, a) {
    if (!cfg.hasTail) return;
    const wag = a.tailWag * 1.0 + Math.sin(Date.now() * 0.008) * a.tailWag * 0.8;
    ctx.save();

    if (state.avatar === 'saca') {
      ctx.translate(80, 25);
      ctx.rotate(0.1 + wag * 0.3);
      // tail fin (caudal fin)
      ctx.fillStyle = cfg.body;
      ctx.strokeStyle = cfg.bodyDark;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(45, -32);
      ctx.lineTo(55, 0);
      ctx.lineTo(45, 28);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      // fin ray detail
      ctx.strokeStyle = cfg.bodyDark;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(15, -8); ctx.lineTo(40, -22);
      ctx.moveTo(15, 0); ctx.lineTo(48, 0);
      ctx.moveTo(15, 8); ctx.lineTo(40, 18);
      ctx.stroke();
    } else if (state.avatar === 'fox') {
      ctx.translate(-65, 28);
      ctx.rotate(-0.3 + wag);
      // big bushy tail
      ctx.fillStyle = cfg.body;
      ctx.strokeStyle = cfg.bodyDark;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(-28, -5, 34, 18, 0, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      // white tip
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.ellipse(-55, -8, 14, 12, 0, 0, Math.PI * 2);
      ctx.fill();
      // tail fluff detail
      ctx.fillStyle = cfg.bodyDark;
      ctx.globalAlpha = 0.3;
      ctx.beginPath();
      ctx.ellipse(-15, 3, 20, 8, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else if (state.avatar === 'rabbit') {
      ctx.translate(-55, 35);
      ctx.rotate(-0.2 + wag * 0.2);
      // tiny puff tail
      ctx.fillStyle = '#ffffff';
      ctx.strokeStyle = cfg.bodyDark;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(0, 0, 11, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
    } else if (state.avatar === 'dog') {
      ctx.translate(-62, 25);
      ctx.rotate(-0.5 + wag * 0.5);
      // short stubby tail
      ctx.fillStyle = cfg.bodyDark;
      ctx.strokeStyle = cfg.bodyDark;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(-12, 0, 14, 8, 0, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
    } else if (state.avatar === 'cat') {
      ctx.translate(-60, 28);
      ctx.rotate(-0.4 + wag);
      // long thin tail
      ctx.fillStyle = cfg.body;
      ctx.strokeStyle = cfg.bodyDark;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(-20, -2, 26, 7, 0, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      // tail tip
      ctx.fillStyle = cfg.bodyDark;
      ctx.beginPath();
      ctx.arc(-44, -3, 6, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // generic tail
      ctx.fillStyle = cfg.body;
      ctx.strokeStyle = cfg.bodyDark;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(-60, 30, 20, 9, -0.3 + wag, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
    }
    ctx.restore();
  }

  function drawHead(cfg, a) {
    const shape = cfg.shape;
    let headY = -28;
    let headR = 50;
    if (shape === 'spindle') { headY = -8; headR = 48; }

    // ears (draw behind head)
    drawEars(cfg, headY, headR, a);

    // head
    ctx.fillStyle = cfg.body;
    ctx.strokeStyle = cfg.bodyDark;
    ctx.lineWidth = 2;
    if (shape === 'pointy') {
      // fox: triangular face, elongated snout
      ctx.beginPath();
      ctx.moveTo(0, headY - headR * 0.9);
      ctx.quadraticCurveTo(headR * 0.9, headY - 5, 0, headY + headR * 0.9);
      ctx.quadraticCurveTo(-headR * 0.9, headY - 5, 0, headY - headR * 0.9);
      ctx.fill(); ctx.stroke();
      // snout protrusion
      ctx.fillStyle = cfg.body;
      ctx.beginPath();
      ctx.ellipse(0, headY + headR * 0.5, 20, 16, 0, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      ctx.fillStyle = cfg.belly;
      ctx.beginPath();
      ctx.ellipse(0, headY + headR * 0.6, 14, 10, 0, 0, Math.PI * 2);
      ctx.fill();
    } else if (state.avatar === 'dog') {
      // dog: longer snout
      ctx.beginPath();
      ctx.arc(0, headY - 5, headR * 0.9, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      // snout
      ctx.fillStyle = cfg.body;
      ctx.beginPath();
      ctx.ellipse(0, headY + headR * 0.45, 22, 18, 0, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      ctx.fillStyle = cfg.belly;
      ctx.beginPath();
      ctx.ellipse(0, headY + headR * 0.55, 16, 12, 0, 0, Math.PI * 2);
      ctx.fill();
    } else if (state.avatar === 'rabbit') {
      // rabbit: rounder face, shorter
      ctx.beginPath();
      ctx.arc(0, headY + 3, headR * 0.85, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      // cheek fluff
      ctx.fillStyle = cfg.belly;
      ctx.beginPath();
      ctx.ellipse(-20, headY + 15, 14, 10, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(20, headY + 15, 14, 10, 0, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.arc(0, headY, headR, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
    }

    // brow (for brow_raise)
    if (a.eyeWide > 0.1) {
      ctx.strokeStyle = cfg.bodyDark;
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      const browY = headY - 18 - a.eyeWide * 6;
      [-1, 1].forEach(s => {
        ctx.beginPath();
        ctx.moveTo(s * 14 - 6, browY + 2);
        ctx.quadraticCurveTo(s * 14, browY - 3, s * 14 + 6, browY + 2);
        ctx.stroke();
      });
    }

    // eyes
    drawEyes(cfg, headY, headR, a);

    // nose / snout
    drawNose(cfg, headY, headR);

    // mouth (expression-driven)
    drawMouth(cfg, headY, headR, a);

    // whiskers for cat/fox
    if (state.avatar === 'cat' || state.avatar === 'fox') {
      drawWhiskers(cfg, headY, headR);
    }
  }

  function drawEars(cfg, headY, headR, a) {
    const ears = cfg.ears;
    if (!ears) return;
    ctx.fillStyle = cfg.body;
    ctx.strokeStyle = cfg.bodyDark;
    ctx.lineWidth = 2;
    const tilt = a.headTilt;

    if (ears === 'triangle') {
      // cat / fox
      const earH = state.avatar === 'fox' ? 1.3 : 1.1;
      ctx.beginPath();
      ctx.moveTo(-headR * 0.65, headY - headR * 0.45);
      ctx.lineTo(-headR * 0.4, headY - headR * earH - tilt * 8);
      ctx.lineTo(-headR * 0.15, headY - headR * 0.55);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(headR * 0.65, headY - headR * 0.45);
      ctx.lineTo(headR * 0.4, headY - headR * earH + tilt * 8);
      ctx.lineTo(headR * 0.15, headY - headR * 0.55);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      // inner ear
      ctx.fillStyle = cfg.accent;
      ctx.beginPath();
      ctx.moveTo(-headR * 0.5, headY - headR * 0.55);
      ctx.lineTo(-headR * 0.4, headY - headR * (earH - 0.2) - tilt * 6);
      ctx.lineTo(-headR * 0.28, headY - headR * 0.6);
      ctx.closePath(); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(headR * 0.5, headY - headR * 0.55);
      ctx.lineTo(headR * 0.4, headY - headR * (earH - 0.2) + tilt * 6);
      ctx.lineTo(headR * 0.28, headY - headR * 0.6);
      ctx.closePath(); ctx.fill();
    } else if (ears === 'floppy') {
      // dog - big floppy ears
      ctx.fillStyle = cfg.bodyDark;
      ctx.beginPath();
      ctx.ellipse(-headR * 0.65, headY - headR * 0.1 + tilt * 3, 20, 36, -0.4 + tilt * 0.2, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      ctx.beginPath();
      ctx.ellipse(headR * 0.65, headY - headR * 0.1 - tilt * 3, 20, 36, 0.4 + tilt * 0.2, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      // ear inner
      ctx.fillStyle = cfg.accent;
      ctx.globalAlpha = 0.4;
      ctx.beginPath();
      ctx.ellipse(-headR * 0.65, headY - headR * 0.1 + tilt * 3, 10, 22, -0.4 + tilt * 0.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(headR * 0.65, headY - headR * 0.1 - tilt * 3, 10, 22, 0.4 + tilt * 0.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else if (ears === 'long') {
      // rabbit - very long ears
      ctx.fillStyle = cfg.body;
      ctx.beginPath();
      ctx.ellipse(-headR * 0.3 - tilt * 3, headY - headR * 1.15, 13, 44, -0.15 + tilt * 0.1, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      ctx.beginPath();
      ctx.ellipse(headR * 0.3 + tilt * 3, headY - headR * 1.15, 13, 44, 0.15 + tilt * 0.1, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      // inner ear
      ctx.fillStyle = cfg.accent;
      ctx.beginPath();
      ctx.ellipse(-headR * 0.3 - tilt * 3, headY - headR * 1.15, 6, 34, -0.15 + tilt * 0.1, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(headR * 0.3 + tilt * 3, headY - headR * 1.15, 6, 34, 0.15 + tilt * 0.1, 0, Math.PI * 2);
      ctx.fill();
      // ear tips (darker)
      ctx.fillStyle = cfg.bodyDark;
      ctx.beginPath();
      ctx.ellipse(-headR * 0.3 - tilt * 3, headY - headR * 1.45, 10, 8, -0.15 + tilt * 0.1, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(headR * 0.3 + tilt * 3, headY - headR * 1.45, 10, 8, 0.15 + tilt * 0.1, 0, Math.PI * 2);
      ctx.fill();
    } else if (ears === 'round') {
      // bear - round ears
      ctx.beginPath();
      ctx.arc(-headR * 0.6, headY - headR * 0.7, 17, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      ctx.beginPath();
      ctx.arc(headR * 0.6, headY - headR * 0.7, 17, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      ctx.fillStyle = cfg.accent;
      ctx.beginPath();
      ctx.arc(-headR * 0.6, headY - headR * 0.7, 9, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(headR * 0.6, headY - headR * 0.7, 9, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawEyes(cfg, headY, headR, a) {
    const eyeY = headY - 5;
    const eyeOffsetX = state.avatar === 'saca' ? 28 : 24;
    const baseR = state.avatar === 'saca' ? 20 : 16;
    const wide = 1 + a.eyeWide * 0.7;
    const eyeR = baseR * wide;
    const openH = Math.max(0, a.eyeOpen - Math.max(0, a.smile) * 0.35);
    const lookX = a.lookX || 0;
    const lookY = a.lookY || 0;
    const lidColor = darkenColor(cfg.bodyDark, 0.55);
    const lidLineColor = darkenColor(cfg.bodyDark, 0.75);

    if (state.avatar === 'saca') {
      [-1, 1].forEach(s => {
        const eyeHalfW = eyeR;
        const eyeHalfH = eyeR * openH;
        if (openH > 0.03) {
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(s * eyeOffsetX - eyeHalfW, eyeY - eyeHalfH, eyeHalfW * 2, Math.max(4, eyeHalfH * 2));
          ctx.strokeStyle = cfg.bodyDark;
          ctx.lineWidth = 1.5;
          ctx.strokeRect(s * eyeOffsetX - eyeHalfW, eyeY - eyeHalfH, eyeHalfW * 2, Math.max(4, eyeHalfH * 2));
        }
        if (openH > 0.08) {
          const pupilR = eyeR * 0.4 * Math.max(0.25, openH);
          ctx.fillStyle = cfg.eye;
          ctx.beginPath();
          ctx.arc(s * eyeOffsetX + lookX * 14, eyeY + lookY * 10, pupilR, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#ffffff';
          ctx.beginPath();
          ctx.arc(s * eyeOffsetX + lookX * 14 - 5, eyeY + lookY * 10 - 5, eyeR * 0.25 * Math.max(0.25, openH), 0, Math.PI * 2);
          ctx.fill();
        }
        if (openH < 0.7) {
          const lidH = Math.max(5, eyeR * 1.3 * (1 - openH));
          ctx.fillStyle = lidColor;
          ctx.fillRect(s * eyeOffsetX - eyeHalfW - 2, eyeY - lidH / 2, eyeHalfW * 2 + 4, lidH);
          ctx.strokeStyle = lidLineColor;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(s * eyeOffsetX - eyeHalfW - 2, eyeY);
          ctx.lineTo(s * eyeOffsetX + eyeHalfW + 2, eyeY);
          ctx.stroke();
        }
      });
    } else {
      [-1, 1].forEach(s => {
        const eyeHalfW = eyeR;
        const eyeHalfH = eyeR * openH;
        if (openH > 0.03) {
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(s * eyeOffsetX - eyeHalfW, eyeY - eyeHalfH, eyeHalfW * 2, Math.max(4, eyeHalfH * 2));
          ctx.strokeStyle = cfg.bodyDark;
          ctx.lineWidth = 1.5;
          ctx.strokeRect(s * eyeOffsetX - eyeHalfW, eyeY - eyeHalfH, eyeHalfW * 2, Math.max(4, eyeHalfH * 2));
        }
        if (openH > 0.08) {
          const pupilX = s * eyeOffsetX + lookX * 12;
          const pupilY = eyeY + lookY * 8;
          const pupilR = eyeR * 0.4 * Math.max(0.25, openH);
          ctx.fillStyle = cfg.eye;
          ctx.beginPath();
          ctx.ellipse(pupilX, pupilY, pupilR * 1.1, pupilR, 0, 0, Math.PI * 2);
          ctx.fill();
          const hlR = eyeR * 0.22 * Math.max(0.25, openH);
          ctx.fillStyle = '#ffffff';
          ctx.beginPath();
          ctx.arc(pupilX - pupilR * 0.3, pupilY - pupilR * 0.3, hlR, 0, Math.PI * 2);
          ctx.fill();
        }
        if (openH < 0.7) {
          const lidY = eyeY;
          const lidH = Math.max(5, eyeR * 1.3 * (1 - openH));
          ctx.fillStyle = lidColor;
          ctx.fillRect(s * eyeOffsetX - eyeHalfW - 2, lidY - lidH / 2, eyeHalfW * 2 + 4, lidH);
          ctx.strokeStyle = lidLineColor;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(s * eyeOffsetX - eyeHalfW - 2, eyeY);
          ctx.lineTo(s * eyeOffsetX + eyeHalfW + 2, eyeY);
          ctx.stroke();
        }
      });
    }
  }

  function drawNose(cfg, headY, headR) {
    if (state.avatar === 'saca') return;
    const noseY = headY + headR * 0.35;
    ctx.fillStyle = cfg.eye;
    if (state.avatar === 'dog') {
      // bigger dog nose
      ctx.beginPath();
      ctx.ellipse(0, noseY + 5, 9, 7, 0, 0, Math.PI * 2);
      ctx.fill();
      // nose shine
      ctx.fillStyle = '#ffffff';
      ctx.globalAlpha = 0.5;
      ctx.beginPath();
      ctx.arc(-2, noseY + 3, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else if (state.avatar === 'cat' || state.avatar === 'bear') {
      ctx.beginPath();
      ctx.ellipse(0, noseY, 7, 5, 0, 0, Math.PI * 2);
      ctx.fill();
    } else if (state.avatar === 'fox') {
      ctx.beginPath();
      ctx.ellipse(0, noseY + 12, 6, 4, 0, 0, Math.PI * 2);
      ctx.fill();
    } else if (state.avatar === 'rabbit') {
      // tiny pink nose
      ctx.fillStyle = cfg.accent;
      ctx.beginPath();
      ctx.ellipse(0, noseY, 5, 4, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawMouth(cfg, headY, headR, a) {
    const mouthY = headY + headR * 0.6;
    ctx.strokeStyle = cfg.eye;
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';

    if (a.mouthOpen > 0.05) {
      const mW = 14 + 6 * a.mouthOpen;
      const mH = 4 + 14 * a.mouthOpen;
      ctx.fillStyle = '#3a1a2a';
      ctx.beginPath();
      ctx.ellipse(0, mouthY, mW, mH, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      if (a.mouthOpen > 0.4) {
        ctx.fillStyle = '#ff6b9d';
        ctx.beginPath();
        ctx.ellipse(0, mouthY + mH * 0.3, mW * 0.5, mH * 0.4, 0, 0, Math.PI);
        ctx.fill();
      }
    } else if (a.smile > 0.05) {
      const smileW = 14 + 8 * a.smile;
      const smileDepth = 4 + 14 * a.smile;
      ctx.lineWidth = 2.5 + a.smile;
      ctx.beginPath();
      ctx.moveTo(-smileW, mouthY - 2);
      ctx.quadraticCurveTo(0, mouthY + smileDepth, smileW, mouthY - 2);
      ctx.stroke();
    } else if (a.smile < -0.05) {
      ctx.beginPath();
      ctx.moveTo(-14, mouthY + 4);
      ctx.quadraticCurveTo(0, mouthY - 10, 14, mouthY + 4);
      ctx.stroke();
    } else {
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-12, mouthY);
      ctx.lineTo(12, mouthY);
      ctx.stroke();
    }
  }

  function drawWhiskers(cfg, headY, headR) {
    ctx.strokeStyle = cfg.bodyDark;
    ctx.lineWidth = 1;
    const wy = headY + headR * 0.45;
    [-1, 1].forEach(s => {
      [-6, 0, 6].forEach(off => {
        ctx.beginPath();
        ctx.moveTo(s * 16, wy + off);
        ctx.lineTo(s * 42, wy + off + s * 4);
        ctx.stroke();
      });
    });
  }
  // ============================================================
  // Animation loop
  // ============================================================
  function lerp(a, b, k) { return a + (b - a) * k; }
  function darkenColor(hex, amount) {
    const c = hex.replace('#', '');
    const r = parseInt(c.substring(0, 2), 16);
    const g = parseInt(c.substring(2, 4), 16);
    const b = parseInt(c.substring(4, 6), 16);
    const dr = Math.max(0, Math.floor(r * (1 - amount)));
    const dg = Math.max(0, Math.floor(g * (1 - amount)));
    const db = Math.max(0, Math.floor(b * (1 - amount)));
    return `rgb(${dr}, ${dg}, ${db})`;
  }

  function tick() {
    const a = state.anim;
    const tg = state.animTargets;
    a.eyeOpen = lerp(a.eyeOpen, tg.eyeOpen, 0.6);
    a.mouthOpen = lerp(a.mouthOpen, tg.mouthOpen, 0.6);
    a.smile = lerp(a.smile, tg.smile, 0.6);
    a.eyeWide = lerp(a.eyeWide, tg.eyeWide, 0.6);
    a.lookX = lerp(a.lookX, tg.lookX, 0.5);
    a.lookY = lerp(a.lookY, tg.lookY, 0.5);
    a.headTilt = lerp(a.headTilt, tg.headTilt, 0.5);
    a.headOffsetX = lerp(a.headOffsetX, tg.headOffsetX, 0.5);
    a.tailWag = lerp(a.tailWag, tg.tailWag, 0.5);
    a.bounceY = lerp(a.bounceY, tg.bounceY, 0.5);
    a.bodyLean = lerp(a.bodyLean, tg.bodyLean, 0.5);
    a.bodyCrouch = lerp(a.bodyCrouch, tg.bodyCrouch, 0.6);
    a.pawLeft = lerp(a.pawLeft, tg.pawLeft, 0.5);
    a.pawRight = lerp(a.pawRight, tg.pawRight, 0.5);

    // jump animation
    if (a.jumpPhase >= 0) {
      a.jumpPhase += 0.06;
      if (a.jumpPhase >= 1) {
        a.jumpPhase = -1;
        tg.bounceY = 0;
      } else {
        const j = a.jumpPhase;
        tg.bounceY = -Math.sin(j * Math.PI) * 40;
      }
    }

    drawAvatar();
    requestAnimationFrame(tick);
  }

  // ============================================================
  // Controls rendering
  // ============================================================
  function renderAvatarGrid() {
    const grid = document.getElementById('avatarGrid');
    grid.innerHTML = '';
    const emojis = { saca: '🐟', cat: '🐱', dog: '🐶', rabbit: '🐰', fox: '🦊', bear: '🐻' };
    AVATARS.forEach(av => {
      const btn = document.createElement('button');
      btn.className = 'avatar-btn' + (state.avatar === av ? ' active' : '');
      btn.innerHTML = `<span class="emoji">${emojis[av]}</span><span>${t('av_' + av)}</span>`;
      btn.onclick = () => selectAvatar(av, 'app');
      grid.appendChild(btn);
    });
  }

  function renderExprGrid() {
    const grid = document.getElementById('exprGrid');
    grid.innerHTML = '';
    const emojis = { blink: '😉', halfblink: '😌', mouth: '😮', smile: '😊', look_left: '👈', look_right: '👉', look_up: '👆', brow_raise: '🙂', head_left: '↩️', head_right: '↪️' };
    FACES.forEach(ex => {
      const btn = document.createElement('button');
      btn.className = 'ctrl-btn' + (state.face === ex ? ' active' : '');
      btn.innerHTML = `${emojis[ex] || '😊'} ${t('ex_' + ex)}`;
      btn.onclick = () => triggerFace(ex, 'app');
      btn.disabled = !state.faceCapture;
      btn.style.opacity = state.faceCapture ? '1' : '0.4';
      btn.style.cursor = state.faceCapture ? 'pointer' : 'not-allowed';
      grid.appendChild(btn);
    });
  }

  function renderActionGrid() {
    const grid = document.getElementById('actionGrid');
    grid.innerHTML = '';
    const emojis = { idle: '🧍', paw_left: '🐾', paw_right: '🐾', lean_left: '↪️', lean_right: '↩️', crouch: '🧎', jump: '⬆️', tail_wag: '🐕', bounce: '⬆️' };
    POSES.forEach(pose => {
      const btn = document.createElement('button');
      btn.className = 'ctrl-btn' + (state.pose === pose ? ' active' : '');
      btn.innerHTML = `${emojis[pose] || '🐾'} ${t('po_' + pose)}`;
      btn.onclick = () => triggerPose(pose, 'app');
      btn.disabled = !state.poseCapture && pose !== 'idle';
      btn.style.opacity = (state.poseCapture || pose === 'idle') ? '1' : '0.4';
      btn.style.cursor = (state.poseCapture || pose === 'idle') ? 'pointer' : 'not-allowed';
      grid.appendChild(btn);
    });
  }

  function renderPresets() {
    // web presets
    const webRow = document.getElementById('webPresetRow');
    webRow.innerHTML = '';
    VOICE_PRESETS.forEach(p => {
      const btn = document.createElement('button');
      btn.className = 'preset-btn' + (voiceAdapter.preset === p ? ' active' : '');
      btn.textContent = t('vp_' + p);
      btn.onclick = () => { state.webVoicePreset = p; applyWebPreset(); renderPresets(); renderStates(); log('app', t('log_synced') + ': ' + t('vp_' + p)); };
      webRow.appendChild(btn);
    });
    // ai presets (display only, disabled)
    const aiRow = document.getElementById('aiPresetRow');
    aiRow.innerHTML = '';
    VOICE_PRESETS.forEach(p => {
      const btn = document.createElement('button');
      btn.className = 'preset-btn';
      btn.textContent = t('vp_' + p);
      btn.disabled = true;
      btn.title = t('vs_appOnly');
      aiRow.appendChild(btn);
    });
  }

  // ============================================================
  // State panels
  // ============================================================
  function renderStates() {
    const appEl = document.getElementById('appState');
    const viewerEl = document.getElementById('viewerState');
    const rows = [
      { k: 'st_avatar', v: t('av_' + state.avatar) },
      { k: 'st_faceCapture', v: state.faceCapture ? t('st_on') : t('st_off'), cls: state.faceCapture ? 'on' : 'off' },
      { k: 'st_expr', v: state.face ? t('ex_' + state.face) : '—', cls: state.face ? 'on' : 'off' },
      { k: 'st_poseCapture', v: state.poseCapture ? t('st_on') : t('st_off'), cls: state.poseCapture ? 'on' : 'off' },
      { k: 'st_pose', v: t('po_' + state.pose) },
      { k: 'st_webVoice', v: voiceAdapter.isActive ? t('st_on') : t('st_off'), cls: voiceAdapter.isActive ? 'on' : 'off' },
      { k: 'st_voicePreset', v: t('vp_' + voiceAdapter.preset) },
      { k: 'st_aiVoice', v: t('st_realAppOnly'), cls: 'warn' },
      { k: 'st_captureMode', v: t('st_simulated') },
      { k: 'st_subtitle', v: state.subtitle ? t('st_on') : t('st_off'), cls: state.subtitle ? 'on' : 'off' },
    ];
    const html = rows.map(r =>
      `<div class="state-row"><span class="k">${t(r.k)}</span><span class="v ${r.cls || ''}">${r.v}</span></div>`
    ).join('');
    appEl.innerHTML = html;
    viewerEl.innerHTML = html;

    // chips
    document.getElementById('chipAvatar').textContent = t('av_' + state.avatar);
    document.getElementById('chipExpr').textContent = state.face ? t('ex_' + state.face) : '—';
    document.getElementById('chipAction').textContent = t('po_' + state.pose);

    // viewer remote trigger buttons
    const viewerBtns = document.createElement('div');
    viewerBtns.style.cssText = 'display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;';
    const remoteExprBtn = document.createElement('button');
    remoteExprBtn.className = 'ctrl-btn';
    remoteExprBtn.style.cssText = 'flex:1;min-width:80px;';
    remoteExprBtn.textContent = '😊 ' + t('ex_smile');
    remoteExprBtn.onclick = () => triggerFace('smile', 'viewer');
    const remotePoseBtn = document.createElement('button');
    remotePoseBtn.className = 'ctrl-btn';
    remotePoseBtn.style.cssText = 'flex:1;min-width:80px;';
    remotePoseBtn.textContent = '🐾 ' + t('po_tail_wag');
    remotePoseBtn.onclick = () => triggerPose('tail_wag', 'viewer');
    viewerBtns.appendChild(remoteExprBtn);
    viewerBtns.appendChild(remotePoseBtn);
    viewerEl.appendChild(viewerBtns);
  }

  function renderVoiceStatus() {
    const wsEl = document.getElementById('webVoiceStatus');
    const wsText = document.getElementById('webVoiceStatusText');
    wsEl.className = 'voice-status ' + voiceStatusClass();
    wsText.textContent = voiceStatusText();

    const aiEl = document.getElementById('aiVoiceStatus');
    const aiText = document.getElementById('aiVoiceStatusText');
    aiEl.className = 'voice-status';
    aiText.textContent = t('vs_appOnly');
  }

  // ============================================================
  // Interactions
  // ============================================================
  function selectAvatar(av, src) {
    state.avatar = av;
    renderAvatarGrid();
    renderStates();
    log(src, t('log_appAvatar') + ': ' + t('av_' + av));
    log('sys', t('log_synced'));
  }

  function triggerFace(ex, src) {
    if (!state.faceCapture) {
      log('sys', LANG === 'zh' ? '面捕未开启，表情按钮无效' : 'Face Capture off, expression buttons disabled');
      return;
    }
    state.face = ex;
    const tg = state.animTargets;
    tg.eyeOpen = 1; tg.mouthOpen = 0; tg.smile = 0; tg.eyeWide = 0;
    tg.lookX = 0; tg.lookY = 0; tg.headTilt = 0; tg.headOffsetX = 0;
    switch (ex) {
      case 'blink': tg.eyeOpen = 0.02; break;
      case 'halfblink': tg.eyeOpen = 0.4; break;
      case 'mouth': tg.mouthOpen = 1.0; break;
      case 'smile': tg.smile = 1.0; break;
      case 'look_left': tg.lookX = -2.0; break;
      case 'look_right': tg.lookX = 2.0; break;
      case 'look_up': tg.lookY = -1.6; break;
      case 'brow_raise': tg.eyeWide = 1; break;
      case 'head_left': tg.headTilt = -0.9; tg.headOffsetX = -22; break;
      case 'head_right': tg.headTilt = 0.9; tg.headOffsetX = 22; break;
    }
    renderExprGrid();
    renderStates();
    log(src, (src === 'viewer' ? t('log_viewerExpr') : t('log_appExpr')) + ': ' + t('ex_' + ex));
    log('sys', t('log_synced'));
    setTimeout(() => {
      if (state.face === ex) {
        state.face = null;
        tg.eyeOpen = 1; tg.mouthOpen = 0; tg.smile = 0; tg.eyeWide = 0;
        tg.lookX = 0; tg.lookY = 0; tg.headTilt = 0; tg.headOffsetX = 0;
        renderExprGrid();
        renderStates();
      }
    }, 1500);
  }

  function triggerPose(pose, src) {
    if (!state.poseCapture && pose !== 'idle') {
      log('sys', LANG === 'zh' ? '姿态捕捉未开启，动作按钮无效' : 'Pose Capture off, action buttons disabled');
      return;
    }
    state.pose = pose;
    const tg = state.animTargets;
    tg.bodyLean = 0; tg.bodyCrouch = 0; tg.tailWag = 0; tg.bounceY = 0;
    tg.pawLeft = 0; tg.pawRight = 0;
    state.anim.jumpPhase = -1;
    switch (pose) {
      case 'idle': break;
      case 'paw_left': tg.pawLeft = 1.2; break;
      case 'paw_right': tg.pawRight = 1.2; break;
      case 'lean_left': tg.bodyLean = -0.8; break;
      case 'lean_right': tg.bodyLean = 0.8; break;
      case 'crouch': tg.bodyCrouch = 1.0; break;
      case 'jump': state.anim.jumpPhase = 0; break;
      case 'tail_wag': tg.tailWag = 1.2; break;
      case 'bounce': tg.bounceY = -35; setTimeout(() => { tg.bounceY = 0; }, 450); break;
    }
    renderActionGrid();
    renderStates();
    log(src, (src === 'viewer' ? t('log_viewerAction') : t('log_appAction')) + ': ' + t('po_' + pose));
    log('sys', t('log_synced'));
    if (pose === 'tail_wag') {
      setTimeout(() => {
        tg.tailWag = 0;
        if (state.pose === pose) { state.pose = 'idle'; renderActionGrid(); renderStates(); }
      }, 1800);
    } else if (pose !== 'idle') {
      setTimeout(() => {
        if (state.pose === pose) { state.pose = 'idle'; renderActionGrid(); renderStates(); }
      }, 1500);
    }
  }

  // ============================================================
  // Web Voice — 复用主项目 VoiceChanger（通过 adapter，不复制第二套实现）
  // ============================================================
  // adapter 状态 → i18n key 后缀
  const VOICE_STATUS_KEYS = {
    'not-loaded': 'vs_ready',
    'checking-support': 'vs_checking',
    'requesting-microphone': 'vs_requesting',
    'enabled': 'vs_enabled',
    'disabled': 'vs_ready',
    'repairing': 'vs_repairing',
    'unsupported': 'vs_unsupported',
    'permission-denied': 'vs_permRequired',
    'error': 'vs_error',
  };

  function voiceStatusText() {
    const key = VOICE_STATUS_KEYS[voiceAdapter.status] || 'vs_error';
    let text = t(key);
    if (voiceAdapter.reason && ['repairing', 'unsupported', 'permission-denied', 'error'].includes(voiceAdapter.status)) {
      text += '：' + voiceAdapter.reason;
    }
    return text;
  }

  function voiceStatusClass() {
    const map = {
      'enabled': 'enabled',
      'requesting-microphone': 'requesting',
      'checking-support': 'requesting',
      'repairing': 'requesting',
      'error': 'error',
      'permission-denied': 'error',
      'unsupported': 'error',
    };
    return map[voiceAdapter.status] || 'ready';
  }

  voiceAdapter.onChange(() => {
    renderVoiceStatus();
    renderStates();
    const toggle = document.getElementById('webVoiceToggle');
    if (toggle) {
      toggle.textContent = voiceAdapter.isActive ? t('toggleDisable') : t('toggleEnable');
      toggle.classList.toggle('on', voiceAdapter.isActive);
    }
  });

  async function toggleWebVoice() {
    if (voiceAdapter.isActive) {
      voiceAdapter.disable();
      log('app', t('log_webVoiceOff'));
      return;
    }
    log('app', t('vs_requesting'));
    await voiceAdapter.enable();
    if (voiceAdapter.isActive) {
      log('app', t('log_webVoiceOn') + ' [' + t('vp_' + voiceAdapter.preset) + ']');
    } else if (voiceAdapter.status === 'permission-denied') {
      log('app', t('log_webVoicePerm'));
    } else if (voiceAdapter.status === 'repairing' || voiceAdapter.status === 'unsupported' || voiceAdapter.status === 'error') {
      log('app', t('log_webVoiceErr') + '：' + voiceAdapter.reason);
    }
  }

  function applyWebPreset() {
    voiceAdapter.applyPreset(state.webVoicePreset);
  }

  // ============================================================
  // Face / Pose Capture toggles
  // ============================================================
  function toggleFaceCapture() {
    state.faceCapture = !state.faceCapture;
    document.getElementById('faceCaptureToggle').checked = state.faceCapture;
    renderExprGrid();
    renderStates();
    log('app', (LANG === 'zh' ? '面捕' : 'Face Capture') + (state.faceCapture ? (LANG === 'zh' ? '已开启' : ' enabled') : (LANG === 'zh' ? '已关闭' : ' disabled')));
    log('sys', t('log_synced'));
  }
  function togglePoseCapture() {
    state.poseCapture = !state.poseCapture;
    document.getElementById('poseCaptureToggle').checked = state.poseCapture;
    renderActionGrid();
    renderStates();
    log('app', (LANG === 'zh' ? '姿态捕捉' : 'Pose Capture') + (state.poseCapture ? (LANG === 'zh' ? '已开启' : ' enabled') : (LANG === 'zh' ? '已关闭' : ' disabled')));
    log('sys', t('log_synced'));
  }

  // ============================================================
  // AI Voice (info only)
  // ============================================================
  function showAiModal() {
    document.getElementById('aiModalMask').classList.add('show');
    log('app', t('log_aiInfo'));
  }
  function closeAiModal() {
    document.getElementById('aiModalMask').classList.remove('show');
  }

  // ============================================================
  // Event log
  // ============================================================
  function log(src, msg) {
    const list = document.getElementById('logList');
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    const ts = new Date().toLocaleTimeString(LANG === 'zh' ? 'zh-CN' : 'en-US');
    entry.innerHTML = `<span class="ts">${ts}</span><span class="src ${src}">[${src === 'app' ? (LANG === 'zh' ? 'App' : 'App') : src === 'viewer' ? (LANG === 'zh' ? 'Viewer' : 'Viewer') : (LANG === 'zh' ? '系统' : 'SYS')}]</span><span class="msg">${msg}</span>`;
    list.appendChild(entry);
    list.scrollTop = list.scrollHeight;
  }

  // ============================================================
  // Init
  // ============================================================
  function init() {
    setLang('zh');
    renderVoiceStatus();
    document.getElementById('webVoiceToggle').textContent = t('toggleEnable');
    document.getElementById('aiVoiceBtn').textContent = t('aiBtnText');
    // event listeners (module scope, no inline onclick)
    document.querySelectorAll('.lang-btn').forEach(b => {
      b.addEventListener('click', () => setLang(b.dataset.lang));
    });
    document.getElementById('webVoiceToggle').addEventListener('click', toggleWebVoice);
    document.getElementById('aiVoiceBtn').addEventListener('click', showAiModal);
    document.getElementById('aiModalClose').addEventListener('click', closeAiModal);
    document.getElementById('aiModalMask').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeAiModal();
    });
    document.getElementById('faceCaptureToggle').addEventListener('change', toggleFaceCapture);
    document.getElementById('poseCaptureToggle').addEventListener('change', togglePoseCapture);
    log('sys', t('log_init'));
    tick();
  }

  // Lightweight test hook - only active when URL has ?test=1
  if (new URLSearchParams(location.search).get('test') === '1') {
    window.__cheapLiveTest = {
      setFace: (ex) => {
        state.face = ex;
        const tg = state.animTargets;
        tg.eyeOpen = 1; tg.mouthOpen = 0; tg.smile = 0; tg.eyeWide = 0;
        tg.lookX = 0; tg.lookY = 0; tg.headTilt = 0; tg.headOffsetX = 0;
        if (ex === 'blink') tg.eyeOpen = 0.02;
        else if (ex === 'halfblink') tg.eyeOpen = 0.4;
        else if (ex === 'mouth') tg.mouthOpen = 1.0;
        else if (ex === 'smile') tg.smile = 1.0;
        else if (ex === 'look_left') tg.lookX = -2.0;
        else if (ex === 'look_right') tg.lookX = 2.0;
        else if (ex === 'look_up') tg.lookY = -1.6;
        else if (ex === 'brow_raise') tg.eyeWide = 1;
        else if (ex === 'head_left') { tg.headTilt = -0.9; tg.headOffsetX = -22; }
        else if (ex === 'head_right') { tg.headTilt = 0.9; tg.headOffsetX = 22; }
        renderExprGrid();
        renderStates();
      },
      setPose: (pose) => {
        state.pose = pose;
        const tg = state.animTargets;
        tg.pawLeft = 0; tg.pawRight = 0; tg.bodyLean = 0; tg.bodyCrouch = 0;
        tg.bounceY = 0; tg.tailWag = 0;
        if (pose === 'paw_left') tg.pawLeft = 1.2;
        else if (pose === 'paw_right') tg.pawRight = 1.2;
        else if (pose === 'lean_left') tg.bodyLean = -0.8;
        else if (pose === 'lean_right') tg.bodyLean = 0.8;
        else if (pose === 'crouch') tg.bodyCrouch = 1.0;
        else if (pose === 'jump') tg.bounceY = 30;
        else if (pose === 'tail_wag') tg.tailWag = 1.2;
        else if (pose === 'bounce') tg.bounceY = 1;
        renderActionGrid();
        renderStates();
      },
      resetFace: () => {
        state.face = null;
        const tg = state.animTargets;
        tg.eyeOpen = 1; tg.mouthOpen = 0; tg.smile = 0; tg.eyeWide = 0;
        tg.lookX = 0; tg.lookY = 0; tg.headTilt = 0; tg.headOffsetX = 0;
        renderExprGrid();
        renderStates();
      },
      resetPose: () => {
        state.pose = 'idle';
        const tg = state.animTargets;
        tg.pawLeft = 0; tg.pawRight = 0; tg.bodyLean = 0; tg.bodyCrouch = 0;
        tg.bounceY = 0; tg.tailWag = 0;
        renderActionGrid();
        renderStates();
      },
      getState: () => ({
        face: state.face,
        pose: state.pose,
        faceCapture: state.faceCapture,
        poseCapture: state.poseCapture,
        anim: JSON.parse(JSON.stringify(state.anim)),
        animTargets: JSON.parse(JSON.stringify(state.animTargets))
      }),
    };
  }

  init();
  </script>
</body>
</html>
